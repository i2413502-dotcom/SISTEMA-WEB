<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgroVeterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card-login { border-radius: 15px; width: 400px; }
        .btn-agro { background-color: #06A049; color: white; }
        .btn-agro:hover { background-color: #047a37; color: white; }
    </style>
</head>
<body>

<div class="card shadow-lg p-4 card-login">
    <div class="text-center mb-4">
        <img src="/img/logo.jpeg" alt="Logo" style="height:80px;">
        <h3 class="text-success fw-bold mt-2">Iniciar Sesión</h3>
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label fw-bold">Correo electrónico</label>
            <input type="email" class="form-control" id="correo" 
                   placeholder="usuario@correo.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Contraseña</label>
            <input type="password" class="form-control" id="password" 
                   placeholder="******" required>
        </div>
        <button type="submit" class="btn btn-agro w-100 mb-3">
            Ingresar
        </button>
    </form>

    <div class="text-center mb-3 text-muted">¿No tienes cuenta?</div>

    <a href="/registro.html" class="btn btn-outline-success w-100 mb-3">
        Registrarse
    </a>

    <div id="mensaje" class="alert d-none mt-2"></div>
</div>

<script src="/js/auth/login.js"></script>
</body>
</html>
