<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Producto - AgroVeterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --verde: #06A049; --verde-oscuro: #047a37; }
        body { background-color: #fdfbf2; font-family: 'Segoe UI', sans-serif; }
        .main-header { background-color: var(--verde); padding: 10px 0; }
        .badge-carrito { position: absolute; top: -5px; right: -8px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .product-img { width: 100%; max-width: 450px; border-radius: 15px; object-fit: cover; max-height: 400px; }
        .btn-agregar { background-color: var(--verde); color: white; border: none; }
        .btn-agregar:hover { background-color: var(--verde-oscuro); color: white; }
        .cantidad-control { display: flex; align-items: center; gap: 10px; }
        .cantidad-control button { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--verde); background: white; color: var(--verde); font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .cantidad-control input { width: 60px; text-align: center; border: 2px solid #ddd; border-radius: 8px; padding: 5px; }
        .recommended-img { width: 100%; height: 180px; object-fit: cover; }
    </style>
</head>
<body>

<header class="main-header shadow-sm">
    <div class="container-fluid px-4 d-flex align-items-center justify-content-between">
        <a href="/" class="text-decoration-none">
            <img src="/img/logo.jpeg" alt="Logo" style="height:70px;">
        </a>
        <div class="d-flex gap-4 align-items-center">
            <a href="/carrito.html" class="text-white position-relative">
                <i class="bi bi-cart3 fs-4"></i>
                <span id="cart-count" class="badge-carrito">0</span>
            </a>
            <a href="/login.html" class="text-white">
                <i class="bi bi-person-circle fs-4"></i>
            </a>
        </div>
    </div>
</header>

<main class="container my-5">
    <div id="producto-detalle" class="row g-4">
        <div class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p>Cargando producto...</p>
        </div>
    </div>

    <h4 class="text-success mt-5 mb-3 border-bottom pb-2">Productos que te pueden interesar</h4>
    <div class="row g-4" id="productos-recomendados">
        <div class="text-center py-3">
            <div class="spinner-border text-success" role="status"></div>
        </div>
    </div>
</main>

<script src="/js/producto.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
