<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - AgroVeterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --verde: #06A049; --verde-oscuro: #047a37; }
        body { background-color: #fdfbf2; font-family: 'Segoe UI', sans-serif; }
        .main-header { background-color: var(--verde); padding: 10px 0; }
        .badge-carrito { position: absolute; top: -5px; right: -8px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .cart-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
        .cantidad-input { width: 65px; text-align: center; }
        .total-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header class="main-header shadow-sm">
    <div class="container-fluid px-4 d-flex align-items-center justify-content-between">
        <a href="/" class="text-decoration-none">
            <img src="/img/logo.jpeg" alt="Logo" style="height:70px;">
        </a>
        <div class="d-flex gap-4 align-items-center">
            <a href="/carrito.html" class="text-white position-relative">
                <i class="bi bi-cart3 fs-4"></i>
                <span id="cart-count" class="badge-carrito">0</span>
            </a>
            <a href="/login.html" class="text-white">
                <i class="bi bi-person-circle fs-4"></i>
            </a>
        </div>
    </div>
</header>

<main class="container my-5">
    <h2 class="mb-4 text-success fw-bold">
        <i class="bi bi-cart3 me-2"></i>Carrito de Compras
    </h2>

    <div class="row g-4">
        <div class="col-md-8">
            <div id="carrito-items">
                <div class="text-center py-5">
                    <div class="spinner-border text-success" role="status"></div>
                    <p>Cargando carrito...</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="total-box">
                <h5 class="fw-bold border-bottom pb-2">Resumen del pedido</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal:</span>
                    <span id="subtotal">S/. 0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-3">
                    <span class="fw-bold fs-5">Total:</span>
                    <span class="fw-bold fs-5 text-success" id="total">S/. 0.00</span>
                </div>
                <button class="btn w-100 mb-2" style="background-color:#06A049;color:white;" 
                        onclick="finalizarCompra()">
                    <i class="bi bi-bag-check me-2"></i>Finalizar Compra
                </button>
                <a href="/" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-left me-2"></i>Seguir comprando
                </a>
            </div>
        </div>
    </div>
</main>

<script src="/js/carrito.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
